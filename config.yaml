# 双相机标定配置文件

# 相机内参（1080P相机）
camera:
  wall_camera:
    fx: 1340.45
    fy: 1338.90
    cx: 957.66
    cy: 514.79
    height: 2.5  # 相机安装高度（米）
    pitch: 0.0   # 俯仰角（弧度）
    roll: 0.0    # 翻滚角（弧度）
    # 畸变系数
    distortion: [-0.459, 0.264, 0.0006, 0.0006, -0.083]
  
  robot_camera:
    fx: 1340.45
    fy: 1338.90
    cx: 957.66
    cy: 514.79
    height: 0.3  # 相机距离地面高度（米）
    distortion: [-0.459, 0.264, 0.0006, 0.0006, -0.083]

# 标定参数
calibration:
  features: 2000       # ORB特征点数量
  match_ratio: 0.75     # 匹配比率阈值
  ransac_threshold: 3.0 # RANSAC阈值
  ransac_prob: 0.99     # RANSAC置信度

# 图像参数
image:
  input_dir: "data/"
  output_dir: "models/"
  format: "jpg"

# 交互式验证
interactive:
  window_name: "Wall Camera"
  point_color: (0, 255, 0)  # 绿色
  text_color: (255, 255, 255)  # 白色